# kube-platform chart values
# One place to configure your entire platform stack.

##############################################################################
# Global settings
##############################################################################
global:
  # AWS region — required for Route53, Karpenter, etc.
  region: us-east-1
  # EKS cluster name
  clusterName: ""
  # AWS account ID
  accountId: ""

##############################################################################
# cert-manager
# Automates TLS certificate provisioning (Let's Encrypt, ACM, etc.)
##############################################################################
cert-manager:
  enabled: true
  installCRDs: true
  replicaCount: 2
  serviceAccount:
    annotations:
      # IRSA — replace with your cert-manager IRSA role ARN
      eks.amazonaws.com/role-arn: ""
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  tolerations:
    - key: CriticalAddonsOnly
      operator: Exists

##############################################################################
# external-dns
# Syncs Kubernetes Ingress/Service hostnames to Route53
##############################################################################
external-dns:
  enabled: true
  provider: aws
  aws:
    region: us-east-1
    zoneType: public
  domainFilters: []   # e.g. ["example.com"]
  txtOwnerId: ""      # Set to cluster name to avoid conflicts
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: ""
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

##############################################################################
# karpenter
# Event-driven node provisioner — replaces Cluster Autoscaler
##############################################################################
karpenter:
  enabled: true
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: ""
  settings:
    aws:
      clusterName: ""         # Overridden from global.clusterName
      clusterEndpoint: ""     # EKS cluster endpoint
      defaultInstanceProfile: ""
      interruptionQueueName: "" # SQS queue for spot interruption
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

##############################################################################
# metrics-server
# Provides resource metrics for kubectl top and HPA
##############################################################################
metrics-server:
  enabled: true
  replicas: 2
  args:
    - --kubelet-preferred-address-types=InternalIP
    - --kubelet-insecure-tls=false
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

##############################################################################
# NodePool (Karpenter CRD) — default provisioner
##############################################################################
nodePool:
  enabled: true
  name: default
  requirements:
    - key: karpenter.sh/capacity-type
      operator: In
      values: ["on-demand", "spot"]
    - key: kubernetes.io/arch
      operator: In
      values: ["amd64"]
    - key: node.kubernetes.io/instance-type
      operator: In
      values:
        - m5.large
        - m5.xlarge
        - m5.2xlarge
        - m5a.large
        - m5a.xlarge
        - m6i.large
        - m6i.xlarge
  limits:
    cpu: "1000"
    memory: 4000Gi
  disruption:
    consolidationPolicy: WhenUnderutilized
    consolidateAfter: 30s
